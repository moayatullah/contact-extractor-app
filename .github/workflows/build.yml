name: Build APK

on:
  push:
      branches: [ main ]

      jobs:
        build:
            runs-on: ubuntu-latest

                steps:
                    - name: Checkout
                          uses: actions/checkout@v3

                              - name: Install dependencies
                                    run: |
                                            sudo apt-get update
                                                    sudo apt-get install -y libtinfo6

                                                        - name: Build APK
                                                              uses: digreatbrian/buildozer-action@v1

                                                                  - name: Upload APK
                                                                        uses: actions/upload-artifact@v4
                                                                              with:
                                                                                      name: apk
                                                                                              path: bin/*.apk